<svg class="why-illustration" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">

  <!-- 1. Physical book -->
  <g>
    <rect x="14" y="74" width="10" height="56" rx="1" fill="var(--accent)" fill-opacity="0.28" stroke="var(--ink)" stroke-width="1.2"/>
    <rect x="24" y="72" width="36" height="60" rx="2" fill="var(--card-bg)" stroke="var(--ink)" stroke-width="1.5"/>
    <path d="M30 86 L52 86 M30 96 L50 96 M30 106 L48 106 M30 116 L46 116" stroke="var(--soft-ink)" stroke-width="1" stroke-linecap="round"/>
    <text x="32" y="156" font-family="var(--mono)" font-size="7" letter-spacing="0.08em" fill="var(--muted)">PRINT</text>
  </g>

  <!-- arrow -->
  <path d="M66 104 L74 104 M70 100 L74 104 L70 108" fill="none" stroke="var(--soft-ink)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 2. Digital book (tablet / PDF) -->
  <g>
    <rect x="82" y="68" width="48" height="72" rx="5" fill="var(--card-bg)" stroke="var(--ink)" stroke-width="1.5"/>
    <rect x="88" y="76" width="36" height="52" rx="2" fill="var(--paper)" stroke="var(--soft-ink)" stroke-width="1"/>
    <path d="M94 88 L118 88 M94 98 L116 98 M94 108 L114 108 M94 118 L112 118" stroke="var(--soft-ink)" stroke-width="1" stroke-linecap="round" opacity="0.65"/>

    <text x="106" y="156" text-anchor="middle" font-family="var(--mono)" font-size="7" letter-spacing="0.08em" fill="var(--muted)">PDF</text>
  </g>

  <!-- arrow -->
  <path d="M136 104 L144 104 M140 100 L144 104 L140 108" fill="none" stroke="var(--accent)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 3. Interactive web -->
  <g class="why-illustration__float">
    <rect x="150" y="58" width="44" height="92" rx="4" fill="var(--card-bg)" stroke="var(--accent)" stroke-width="1.5"/>
    <path d="M158 68 L186 68" stroke="var(--line)" stroke-width="1"/>
    <circle cx="162" cy="64" r="2" fill="var(--accent)" opacity="0.7"/>
    <circle cx="168" cy="64" r="2" fill="var(--soft-ink)" opacity="0.5"/>
    <circle cx="174" cy="64" r="2" fill="var(--soft-ink)" opacity="0.5"/>
    <rect x="158" y="72" width="28" height="6" rx="2" fill="none" stroke="var(--soft-ink)" stroke-width="1" opacity="0.5"/>
    <path d="M158 88 C166 80 174 96 182 88 C186 84 186 100 178 98 C170 96 166 104 158 96 Z" fill="var(--accent)" fill-opacity="0.18" stroke="var(--accent)" stroke-width="1.1" stroke-linejoin="round"/>
    <path d="M158 110 L168 110 L164 118 L160 118 Z" fill="var(--accent)" fill-opacity="0.25" stroke="var(--accent)" stroke-width="1" stroke-linejoin="round"/>
    <path d="M172 110 L184 110" stroke="var(--soft-ink)" stroke-width="1" stroke-linecap="round"/>
    <circle cx="178" cy="126" r="5" fill="none" stroke="var(--success)" stroke-width="1.1"/>
    <path d="M176 126 L177.5 127.5 L180.5 123.5" fill="none" stroke="var(--success)" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="172" y="142" text-anchor="middle" font-family="var(--mono)" font-size="7" fill="var(--accent)">&lt;/&gt;</text>
    <text x="172" y="156" text-anchor="middle" font-family="var(--mono)" font-size="7" letter-spacing="0.08em" fill="var(--accent)">WEB</text>
  </g>
</svg>
